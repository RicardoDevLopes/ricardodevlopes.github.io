<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Uma surpresa</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;

      font-family: Arial, sans-serif;
      text-align: center;

      background: linear-gradient(160deg, #ffb6c1, #fff0f3);
      color: #5e1830;
    }

    .conteudo {
      width: 100%;
      max-width: 420px;
    }

    h1 {
      margin-bottom: 24px;
      font-size: 2rem;
    }

    button {
      width: 100%;
      padding: 18px;

      border: none;
      border-radius: 50px;

      background: #d6336c;
      color: white;

      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.96);
    }

    #contador {
      display: none;
      font-size: 6rem;
      font-weight: bold;
      animation: aparecer 0.5s ease;
    }

    #surpresa {
      display: none;
      animation: aparecer 1s ease;
    }

    #surpresa h2 {
      font-size: 1.6rem;
      line-height: 1.4;
    }

    #surpresa span {
      display: block;
      margin-top: 16px;
      font-size: 3rem;
    }

    @keyframes aparecer {
      from {
        opacity: 0;
        transform: scale(0.7);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>

<body>
  <main class="conteudo">
    <section id="inicio">
      <h1>Tenho uma coisa para mostrar...</h1>
      <button id="botao">Clica aqui</button>
    </section>

    <div id="contador">3</div>

    <section id="surpresa">
      <h2>
        Óia só, gente...<br>
        minha mulher,<br>
        a mais linda do mundo!
      </h2>

      <span>❤️</span>
    </section>
  </main>

  <script>
    const botao = document.querySelector("#botao");
    const inicio = document.querySelector("#inicio");
    const contador = document.querySelector("#contador");
    const surpresa = document.querySelector("#surpresa");

    botao.addEventListener("click", iniciarContagem);

    function iniciarContagem() {
      inicio.style.display = "none";
      contador.style.display = "block";

      let numero = 3;
      contador.textContent = numero;

      const intervalo = setInterval(() => {
        numero--;

        if (numero > 0) {
          contador.textContent = numero;
        } else {
          clearInterval(intervalo);

          contador.style.display = "none";
          surpresa.style.display = "block";
        }
      }, 1000);
    }
  </script>
</body>
</html>
