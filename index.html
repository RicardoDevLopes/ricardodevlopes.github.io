<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>A mais linda do mundo</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;

      font-family: Arial, sans-serif;
      text-align: center;

      background: linear-gradient(
        160deg,
        #ffb6c1,
        #fff0f3
      );

      color: #5e1830;
    }

    .conteudo {
      width: 100%;
      max-width: 420px;
    }

    h1 {
      margin-bottom: 24px;
      font-size: 2rem;
      line-height: 1.2;
    }

    button {
      width: 100%;
      padding: 18px;

      border: none;
      border-radius: 50px;

      background: #d6336c;
      color: white;

      font-size: 1.2rem;
      font-weight: bold;

      cursor: pointer;
      box-shadow: 0 8px 24px rgba(94, 24, 48, 0.2);
    }

    button:active {
      transform: scale(0.96);
    }

    #contador {
      display: none;

      font-size: 7rem;
      font-weight: bold;

      animation: aparecer 0.5s ease;
    }

    #surpresa {
      display: none;
      animation: aparecer 1s ease;
    }

    #surpresa h2 {
      font-size: 1.7rem;
      line-height: 1.4;
    }

    .instagram {
      margin-top: 28px;

      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .foto-perfil {
      width: 150px;
      height: 150px;

      object-fit: cover;
      border-radius: 50%;

      border: 5px solid white;

      box-shadow:
        0 10px 30px rgba(94, 24, 48, 0.25);
    }

    .seta-baixo {
      font-size: 2.5rem;
      animation: moverSeta 1s infinite alternate;
    }

    .link-instagram {
      width: 100%;
      padding: 17px 22px;

      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;

      border-radius: 50px;

      background: white;
      color: #d6336c;

      text-decoration: none;
      font-size: 1.15rem;
      font-weight: bold;

      box-shadow:
        0 8px 25px rgba(94, 24, 48, 0.15);
    }

    .link-instagram:active {
      transform: scale(0.96);
    }

    .seta-link {
      font-size: 1.8rem;
    }

    .coracao {
      display: block;

      margin-top: 24px;

      font-size: 3rem;
    }

    @keyframes aparecer {
      from {
        opacity: 0;
        transform: scale(0.7);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes moverSeta {
      from {
        transform: translateY(0);
      }

      to {
        transform: translateY(8px);
      }
    }
  </style>
</head>

<body>
  <main class="conteudo">

    <section id="inicio">
      <h1>Tenho uma coisa para mostrar...</h1>

      <button id="botao">
        Clica aqui
      </button>
    </section>

    <div id="contador">
      3
    </div>

    <section id="surpresa">
      <h2>
        Óia só, gente...<br>
        minha mulher,<br>
        a mais linda do mundo!
      </h2>

      <div class="instagram">
        <img
          class="foto-perfil"
          src="https://i.ibb.co/1Jqbc1Bn/651838705-17916839988311826-2294701423270337865-n.webp"
          alt="Foto de perfil da Sara"
        >

        <div class="seta-baixo">
          ↓
        </div>

        <a
          class="link-instagram"
          href="https://www.instagram.com/saraevyn/"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span>@saraevyn</span>
          <span class="seta-link">→</span>
        </a>
      </div>

      <span class="coracao">
        ❤️
      </span>
    </section>

  </main>

  <script>
    const botao = document.querySelector("#botao");
    const inicio = document.querySelector("#inicio");
    const contador = document.querySelector("#contador");
    const surpresa = document.querySelector("#surpresa");

    botao.addEventListener("click", iniciarContagem);

    function iniciarContagem() {
      inicio.style.display = "none";
      contador.style.display = "block";

      let numero = 3;

      contador.textContent = numero;

      const intervalo = setInterval(() => {
        numero--;

        if (numero > 0) {
          contador.textContent = numero;
        } else {
          clearInterval(intervalo);

          contador.style.display = "none";
          surpresa.style.display = "block";
        }
      }, 1000);
    }
  </script>
</body>
</html>
